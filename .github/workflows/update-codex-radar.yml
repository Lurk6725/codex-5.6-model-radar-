name: Update Codex Radar API data

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

permissions:
  contents: write

concurrency:
  group: codex-radar-api-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CODEX_RADAR_API_TOKEN: ${{ secrets.CODEX_RADAR_API_TOKEN }}
      CODEX_RADAR_API_URL: https://codexradar.com/api/v1/current
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch authorized API summary
        run: python scripts/fetch_codex_radar.py
      - name: Build bilingual API report
        run: python scripts/build_api_report.py
      - name: Commit changed data and reports
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- data/api/model_iq_history.csv reports/api-latest.md reports/api-latest.zh-CN.md reports/api-latest.en.md)" ]]; then
            echo "No new API snapshot"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/api/model_iq_history.csv reports/api-latest.md reports/api-latest.zh-CN.md reports/api-latest.en.md
          git commit -m "Update Codex Radar API snapshot"
          git push
