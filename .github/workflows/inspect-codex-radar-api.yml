name: Inspect Codex Radar API

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CODEX_RADAR_API_TOKEN: ${{ secrets.CODEX_RADAR_API_TOKEN }}
      CODEX_RADAR_API_URL: https://codexradar.com/api/v1/current
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inspect response schema without printing values
        run: python scripts/inspect_codex_radar_api.py
