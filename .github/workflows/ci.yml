name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Build report
        run: python scripts/build_report.py
      - name: Verify generated report is non-empty
        run: test -s reports/latest.generated.md
