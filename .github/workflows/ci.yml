name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Build bilingual reports
        run: python scripts/build_report.py
      - name: Verify generated reports
        run: |
          test -s reports/latest.generated.md
          test -s reports/latest.generated.zh-CN.md
          test -s reports/latest.generated.en.md
          grep -q "简体中文" reports/latest.generated.md
          grep -q "English" reports/latest.generated.md
      - name: Verify formal bilingual latest reports
        run: |
          test -s reports/latest.md
          test -s reports/latest.zh-CN.md
          test -s reports/latest.en.md
          grep -q "简体中文" reports/latest.md
          grep -q "English" reports/latest.md
